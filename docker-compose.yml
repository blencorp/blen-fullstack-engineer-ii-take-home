services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: takehome
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  mock-llm:
    build:
      context: ./mock-llm
      dockerfile: Dockerfile
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:11434/health"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
